<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>安全提示链接 - 点击弹出提醒</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1.5rem;
        }

        /* 卡片容器 - 简洁优雅 */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            max-width: 520px;
            width: 100%;
            padding: 2rem 2rem 2.2rem;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 装饰小图标区域 */
        .icon-badge {
            background: #fff2e0;
            width: 70px;
            height: 70px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            box-shadow: 0 6px 12px -8px rgba(0, 0, 0, 0.15);
        }

        .icon-badge svg {
            width: 38px;
            height: 38px;
            stroke: #d45a2b;
            stroke-width: 1.7;
            fill: none;
        }

        .icon-badge .shield-fill {
            fill: #e0693a;
            stroke: none;
        }

        h2 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1e2a3e;
            margin-bottom: 0.6rem;
            letter-spacing: -0.3px;
        }

        .desc {
            font-size: 1rem;
            color: #4a5b6e;
            line-height: 1.5;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.25rem;
        }

        /* 主要链接样式 - 优雅醒目 */
        .alert-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fef7e8;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            color: #c23c1c;
            border: 1px solid #ffd9b5;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
            margin-top: 0.5rem;
        }

        .alert-link:hover {
            background: #fff5e6;
            border-color: #f3b27a;
            color: #a53213;
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px rgba(194, 60, 28, 0.25);
        }

        .alert-link:active {
            transform: translateY(1px);
            transition: 0.05s;
        }

        /* 右侧小箭头 */
        .alert-link::after {
            content: "→";
            font-size: 1.2rem;
            transition: transform 0.2s ease;
            font-weight: 500;
        }

        .alert-link:hover::after {
            transform: translateX(4px);
        }

        /* 辅助提示区域 */
        .footnote {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #7e8c9e;
            background: #f8fafd;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            display: inline-block;
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .card {
                padding: 1.6rem;
            }
            .alert-link {
                font-size: 1rem;
                padding: 0.7rem 1.5rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-badge">
        <!-- 简单盾牌/提醒图标，表示信息安全 -->
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
            <path d="M12 3L3 7.5V12C3 16.5 7 21 12 21C17 21 21 16.5 21 12V7.5L12 3Z" stroke="#d45a2b" fill="rgba(210, 90, 43, 0.1)"/>
            <path d="M12 8V12M12 16H12.01" stroke="#d45a2b" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
    </div>
    <h2>🔐 信息安全驿站</h2>
    <div class="desc">提高警惕 · 守护数据</div>
    
    <!-- 核心链接：点击弹出指定文字 -->
    <a href="#" id="securityAlertLink" class="alert-link">
        📢 点击查看重要提醒
    </a>
    
    <div class="footnote">
        ⚡ 网络陷阱多，时刻保持清醒
    </div>
</div>

<script>
    (function() {
        // 获取链接元素
        const link = document.getElementById('securityAlertLink');
        if (link) {
            // 添加点击事件，完全符合题目要求：弹出文字“注意信息安全，谨防上当受骗！”
            link.addEventListener('click', function(event) {
                // 阻止默认跳转行为（href="#" 不会跳转到页面顶部，也阻止锚点滚动）
                event.preventDefault();
                // 弹出精确提示内容
                alert('注意信息安全，谨防上当受骗！');
            });
        }
    })();
</script>
</body>
</html>
